<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cuenta atras - Juego del Pinguino</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #08111f;
        --panel: rgba(255, 255, 255, 0.1);
        --panel-strong: rgba(255, 255, 255, 0.18);
        --text: #f7fbff;
        --muted: #b6c9d8;
        --cyan: #45d4ff;
        --mint: #61f2b8;
        --orange: #ffb24c;
        --danger: #ff5f7e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 18% 20%, rgba(69, 212, 255, 0.24), transparent 24rem),
          radial-gradient(circle at 82% 28%, rgba(97, 242, 184, 0.16), transparent 20rem),
          linear-gradient(145deg, #08111f 0%, #11243b 54%, #2a2547 100%);
        color: var(--text);
        overflow-x: hidden;
      }

      .countdown-page {
        min-height: 100vh;
      }

      .hero {
        position: relative;
        display: grid;
        grid-template-columns: minmax(0, 1.05fr) minmax(280px, 0.95fr);
        align-items: center;
        gap: clamp(2rem, 5vw, 5rem);
        min-height: 100vh;
        padding: clamp(2rem, 5vw, 5rem);
        isolation: isolate;
      }

      .snow {
        position: absolute;
        inset: 0;
        z-index: -1;
        opacity: 0.5;
        background-image:
          radial-gradient(circle, rgba(255, 255, 255, 0.9) 0 2px, transparent 2px),
          radial-gradient(circle, rgba(255, 255, 255, 0.55) 0 1px, transparent 1px);
        background-position: 0 0, 32px 54px;
        background-size: 96px 96px, 74px 74px;
        animation: snowfall 16s linear infinite;
      }

      .content {
        max-width: 780px;
      }

      .kicker {
        margin: 0 0 1rem;
        color: var(--mint);
        font-size: clamp(0.9rem, 1.8vw, 1rem);
        font-weight: 900;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1 {
        max-width: 11ch;
        margin: 0;
        font-size: clamp(3.5rem, 9vw, 8.5rem);
        line-height: 0.88;
        letter-spacing: 0;
      }

      .deadline {
        margin: 1.5rem 0 2rem;
        color: var(--muted);
        font-size: clamp(1rem, 2vw, 1.35rem);
        font-weight: 700;
      }

      .timer {
        display: grid;
        grid-template-columns: repeat(4, minmax(7rem, 1fr));
        gap: 0.85rem;
        max-width: 680px;
      }

      .time-box {
        min-height: 8.7rem;
        padding: 1rem;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 18px 44px rgba(0, 0, 0, 0.24);
        backdrop-filter: blur(18px);
      }

      .time-box strong {
        display: block;
        font-size: clamp(2.6rem, 7vw, 5.3rem);
        line-height: 0.95;
        letter-spacing: 0;
      }

      .time-box span {
        display: block;
        margin-top: 0.6rem;
        color: var(--muted);
        font-size: 0.9rem;
        font-weight: 900;
        text-transform: uppercase;
      }

      .time-box.urgent strong {
        color: var(--danger);
      }

      .message {
        min-height: 2rem;
        margin: 1.4rem 0 0;
        color: var(--orange);
        font-size: clamp(1rem, 2vw, 1.25rem);
        font-weight: 900;
      }

      .penguin-scene {
        display: grid;
        place-items: end center;
        min-height: min(62vh, 620px);
      }

      .iceberg {
        position: relative;
        width: min(100%, 520px);
        aspect-ratio: 1.35;
        border-radius: 46% 54% 18% 18% / 54% 50% 20% 20%;
        background:
          linear-gradient(145deg, rgba(255, 255, 255, 0.98), rgba(160, 234, 255, 0.86)),
          linear-gradient(180deg, transparent 65%, rgba(69, 212, 255, 0.35));
        box-shadow: inset -34px -44px 0 rgba(69, 212, 255, 0.18), 0 40px 80px rgba(0, 0, 0, 0.28);
      }

      .iceberg::after {
        content: "";
        position: absolute;
        left: 8%;
        right: 8%;
        bottom: -8%;
        height: 12%;
        border-radius: 50%;
        background: rgba(11, 24, 42, 0.36);
        filter: blur(8px);
      }

      .penguin {
        position: absolute;
        left: 50%;
        bottom: 20%;
        width: min(48%, 230px);
        aspect-ratio: 0.72;
        transform: translateX(-50%);
        animation: wobble 1.9s ease-in-out infinite;
      }

      .head,
      .body {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        background: #111827;
        box-shadow: inset -16px -12px 0 rgba(0, 0, 0, 0.18);
      }

      .head {
        top: 0;
        width: 62%;
        aspect-ratio: 1;
        border-radius: 50%;
        z-index: 2;
      }

      .body {
        bottom: 8%;
        width: 84%;
        height: 68%;
        border-radius: 50% 50% 44% 44%;
      }

      .belly {
        position: absolute;
        left: 50%;
        bottom: 9%;
        width: 66%;
        height: 72%;
        transform: translateX(-50%);
        border-radius: 50% 50% 44% 44%;
        background: #f6fbff;
      }

      .eye {
        position: absolute;
        top: 38%;
        width: 9%;
        aspect-ratio: 1;
        border-radius: 50%;
        background: white;
      }

      .eye::after {
        content: "";
        position: absolute;
        inset: 28%;
        border-radius: 50%;
        background: #111827;
      }

      .eye.left {
        left: 28%;
      }

      .eye.right {
        right: 28%;
      }

      .beak {
        position: absolute;
        left: 50%;
        top: 52%;
        width: 21%;
        aspect-ratio: 1.45;
        transform: translateX(-50%);
        border-radius: 50% 50% 56% 56%;
        background: var(--orange);
      }

      .flipper {
        position: absolute;
        top: 24%;
        width: 23%;
        height: 52%;
        border-radius: 50%;
        background: #0b1220;
      }

      .flipper.left {
        left: -9%;
        transform: rotate(24deg);
      }

      .flipper.right {
        right: -9%;
        transform: rotate(-24deg);
      }

      .foot {
        position: absolute;
        bottom: 2%;
        width: 28%;
        height: 10%;
        border-radius: 50%;
        background: var(--orange);
        z-index: -1;
      }

      .foot.left {
        left: 18%;
      }

      .foot.right {
        right: 18%;
      }

      @keyframes snowfall {
        to {
          background-position: 96px 192px, 106px 180px;
        }
      }

      @keyframes wobble {
        0%,
        100% {
          transform: translateX(-50%) rotate(-2deg);
        }

        50% {
          transform: translateX(-50%) rotate(2deg);
        }
      }

      @media (max-width: 900px) {
        .hero {
          grid-template-columns: 1fr;
          align-content: start;
          min-height: 100svh;
        }

        h1 {
          max-width: 9ch;
        }

        .penguin-scene {
          min-height: 280px;
          place-items: center;
        }

        .iceberg {
          width: min(82vw, 380px);
        }
      }

      @media (max-width: 620px) {
        .hero {
          padding: 1.25rem;
        }

        .timer {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .time-box {
          min-height: 7rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="countdown-page">
      <section class="hero" aria-labelledby="page-title">
        <div class="snow" aria-hidden="true"></div>

        <div class="content">
          <p class="kicker">Proyecto del juego del pinguino</p>
          <h1 id="page-title">La entrega se acerca</h1>
          <p class="deadline">
            Viernes 8 de mayo de 2026 · 23:59:59
          </p>

          <div class="timer" role="timer" aria-live="polite">
            <div class="time-box">
              <strong id="days">00</strong>
              <span>Dias</span>
            </div>
            <div class="time-box">
              <strong id="hours">00</strong>
              <span>Horas</span>
            </div>
            <div class="time-box">
              <strong id="minutes">00</strong>
              <span>Minutos</span>
            </div>
            <div class="time-box urgent">
              <strong id="seconds">00</strong>
              <span>Segundos</span>
            </div>
          </div>

          <p id="message" class="message">
            El pinguino ya esta mirando el reloj.
          </p>
        </div>

        <div class="penguin-scene" aria-hidden="true">
          <div class="iceberg">
            <div class="penguin">
              <div class="head">
                <span class="eye left"></span>
                <span class="eye right"></span>
                <span class="beak"></span>
              </div>
              <div class="body">
                <span class="belly"></span>
                <span class="flipper left"></span>
                <span class="flipper right"></span>
              </div>
              <span class="foot left"></span>
              <span class="foot right"></span>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script>
      const deadline = new Date("2026-05-08T23:59:59+02:00").getTime();

      const units = {
        days: document.querySelector("#days"),
        hours: document.querySelector("#hours"),
        minutes: document.querySelector("#minutes"),
        seconds: document.querySelector("#seconds"),
      };

      const message = document.querySelector("#message");

      function pad(value) {
        return String(value).padStart(2, "0");
      }

      function getMessage(days, hours) {
        if (days > 3) return "Aun parece que queda mucho. Esa mentira os va a salir cara.";
        if (days > 1) return "A estas alturas el proyecto deberia tener juego, no solo esperanza.";
        if (days === 1) return "Queda un dia. El pinguino ya no juzga: sentencia.";
        if (hours > 3) return "Queda menos de un dia. El pinguino huele commits hechos con miedo.";
        return "Modo panico elegante: guardad, rezad y subid algo que compile.";
      }

      function updateCountdown() {
        const now = Date.now();
        const remaining = Math.max(0, deadline - now);

        const totalSeconds = Math.floor(remaining / 1000);
        const days = Math.floor(totalSeconds / 86400);
        const hours = Math.floor((totalSeconds % 86400) / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;

        units.days.textContent = pad(days);
        units.hours.textContent = pad(hours);
        units.minutes.textContent = pad(minutes);
        units.seconds.textContent = pad(seconds);

        if (remaining === 0) {
          message.textContent = "Tiempo agotado. El pinguino no acepta excusas, solo builds.";
          document.body.classList.add("finished");
          return;
        }

        message.textContent = getMessage(days, hours);
      }

      updateCountdown();
      setInterval(updateCountdown, 1000);
    </script>
  </body>
</html>
